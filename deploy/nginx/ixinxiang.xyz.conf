server {
    listen 8088;
    listen [::]:8088;
    server_name ixinxiang.xyz;

    root /var/www/socrates-site/current;
    index index.html;

    access_log /var/log/nginx/ixinxiang.xyz.access.log;
    error_log /var/log/nginx/ixinxiang.xyz.error.log warn;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

